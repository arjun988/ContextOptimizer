[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "contextoptimizer"
version = "1.0.0"
description = "Python SDK for the ContextOptimizer AI Context Optimization Engine"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "ContextOptimizer Contributors" }]
keywords = ["ai", "context", "rag", "code-search", "llm"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Typing :: Typed",
]
dependencies = [
  "httpx>=0.27.0",
  "pydantic>=2.9.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "pytest-httpx>=0.30.0"]

[project.urls]
Homepage = "https://github.com/contextoptimizer/contextoptimizer"
Documentation = "https://contextoptimizer.dev"
Repository = "https://github.com/contextoptimizer/contextoptimizer"

[tool.hatch.build.targets.wheel]
packages = ["src/contextoptimizer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
