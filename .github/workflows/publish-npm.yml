name: Publish npm packages

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Publish packages
        run: |
          for pkg in core engine sdk-ts storage-postgres storage vector-store embeddings retrieval ranking compression memory parser indexer graph tokenizer cache observability; do
            if [ -f "packages/$pkg/package.json" ] && grep -q '"private": false' "packages/$pkg/package.json" 2>/dev/null || ! grep -q '"private"' "packages/$pkg/package.json" 2>/dev/null; then
              cd "packages/$pkg"
              if grep -q '"name"' package.json; then
                npm publish --access public || true
              fi
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
